server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: foreign-law-case-system
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:foreign_law_case_system_db}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:123456}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto
  mapper-locations: classpath*:/mapper/**/*.xml

# 微信小程序配置
wechat:
  miniapp:
    app-id: ${WECHAT_APP_ID:wx89d2576571c4ea2b}
    app-secret: ${WECHAT_APP_SECRET:1cd4e24afea609e92b1af45e4d40eae9}
    grant-type: authorization_code

# JWT配置
jwt:
  secret: ${JWT_SECRET:foreignLawCaseSystemSecretKey2026VeryLongSecureKey}
  expiration: 604800  # 7天，单位秒

# FastGPT配置
fastgpt:
  # 翻译/摘要/评分等应用所在实例（中国区）
  base-url: ${FASTGPT_BASE_URL:https://cloud.fastgpt.cn/api}
  api-key: ${FASTGPT_API_KEY:fastgpt-tJsQgrLO0U9cjmBmgipeAgt1a2H9Mx5y2QkGU6rTA7ZgXv4JHw5VcS1n8YE}
  # 翻译应用的API Key
  translation-api-key: ${FASTGPT_TRANSLATION_KEY:fastgpt-tJsQgrLO0U9cjmBmgipeAgt1a2H9Mx5y2QkGU6rTA7ZgXv4JHw5VcS1n8YE}
  # 摘要提取应用的API Key
  summary-api-key: ${FASTGPT_SUMMARY_KEY:fastgpt-tJsQgrLO0U9cjmBmgipeAgt1a2H9Mx5y2QkGU6rTA7ZgXv4JHw5VcS1n8YE}
  # 重要性评分应用的API Key
  score-api-key: ${FASTGPT_SCORE_KEY:fastgpt-tJsQgrLO0U9cjmBmgipeAgt1a2H9Mx5y2QkGU6rTA7ZgXv4JHw5VcS1n8YE}
  # 日本案例翻译应用的API Key（若与通用翻译使用同一个Key，填相同值即可）
  japan-translation-api-key: ${FASTGPT_JAPAN_TRANSLATION_KEY:fastgpt-tJsQgrLO0U9cjmBmgipeAgt1a2H9Mx5y2QkGU6rTA7ZgXv4JHw5VcS1n8YE}
  # 日本案例摘要提取应用的API Key
  japan-summary-api-key: ${FASTGPT_JAPAN_SUMMARY_KEY:fastgpt-tJsQgrLO0U9cjmBmgipeAgt1a2H9Mx5y2QkGU6rTA7ZgXv4JHw5VcS1n8YE}
  # 日本案例重要性评分应用的API Key
  japan-score-api-key: ${FASTGPT_JAPAN_SCORE_KEY:fastgpt-tJsQgrLO0U9cjmBmgipeAgt1a2H9Mx5y2QkGU6rTA7ZgXv4JHw5VcS1n8YE}
  # PDF 文件上传至 FastGPT /v1/files 的超时（秒）
  file-upload-timeout: ${FASTGPT_FILE_UPLOAD_TIMEOUT:120}
  # 智能问答应用所在实例（若与其他应用在同一实例，保持与 base-url 相同即可）
  qa-base-url: ${FASTGPT_QA_BASE_URL:https://cloud.fastgpt.cn/api}
  # 智能问答应用的API Key
  qa-api-key: ${FASTGPT_QA_KEY:fastgpt-tJsQgrLO0U9cjmBmgipeAgt1a2H9Mx5y2QkGU6rTA7ZgXv4JHw5VcS1n8YE}
  model: ${FASTGPT_MODEL:doubao-seed-1-8-251228}
  timeout: 600  # 请求超时秒数
  # 知识库（OpenAPI dataset）：推送案例文本；datasetId 在 FastGPT 控制台知识库详情中查看
  knowledge-dataset-id: ${FASTGPT_DATASET_ID:69af7825c0e6ce86c1d52f08}
  # 留空则使用上面的 api-key（需具备该知识库写入权限）
  knowledge-api-key: ${FASTGPT_KNOWLEDGE_API_KEY:}
  knowledge-timeout: ${FASTGPT_KNOWLEDGE_TIMEOUT:180}

# Python 爬虫进程管理配置
crawler:
  python:
    # Python 脚本所在目录（相对于 Spring Boot 启动目录，建议部署时改为绝对路径）
    script-dir: crawlers
    # Python 可执行文件：Windows 填 python，Linux/Mac 填 python3
    executable: python

# CourtListener API 配置
courtlistener:
  base-url: https://www.courtlistener.com/api/rest/v4
  api-token: ${COURT_LISTENER_TOKEN:44df55326f6318cfb5435d2df417c375a413c39f}
  # 每个关键词最多爬取的页数（每页20条）
  max-pages: 10
  # 请求间隔（毫秒）
  request-delay-ms: 500
  # 二次过滤阈值（全文中涉华关键词命中数 >= 此值才入库）
  filter-threshold: 2

logging:
  level:
    org.example.demo1: debug
    com.baomidou.mybatisplus: warn
